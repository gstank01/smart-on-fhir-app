<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART on FHIR Appointments Dashboard</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <main class="window-box">
        <!-- Status indicator -->
        <div id="status" class="loading" role="status" aria-live="polite">
            Initializing launch handshake...
        </div>

        <!-- Main content area (hidden until data loads) -->
        <div id="demographics-view" class="hidden">
            <header>
                <h1>Patient Chart</h1>
                <section class="demographics-banner">
                    <div class="data-item">
                        <strong>Patient Name:</strong>
                        <span id="pt-name"></span>
                    </div>
                    <div class="data-item">
                        <strong>Birth Date:</strong>
                        <span id="pt-dob"></span>
                    </div>
                    <div class="data-item">
                        <strong>Gender:</strong>
                        <span id="pt-gender"></span>
                    </div>
                </section>

                <!-- Navigation tabs -->
                <nav class="dashboard-nav" aria-label="Dashboard sections">
                    <button class="nav-btn active" data-tab="home-section">
                        Home
                    </button>
                    <button class="nav-btn" data-tab="appointments-section">
                        Appointments
                    </button>
                    <button class="nav-btn" data-tab="encounters-section">
                        Encounters
                    </button>
                    </button>
                    <button class="nav-btn" data-tab="orders-section">
                        Orders
                    </button>
                </nav>
            </header>

            <!-- Content sections -->
            <div class="dashboard-content">
                <section id="home-section" class="tab-content active" aria-labelledby="home-title">
                    <h2 id="home-title">About this app</h2>
                    <p>A test app to use with Epic VendorServices simulator when testing SMART-on-FHIR launch</p>
                </section>

                <section id="appointments-section" class="tab-content" aria-labelledby="appointments-title">
                    <h2 id="appointments-title">Appointments</h2>
                    <div id="appointments-list"></div>
                </section>

                <section id="encounters-section" class="tab-content" aria-labelledby="encounters-title">
                    <h2 id="encounters-title">Encounters</h2>
                    <div id="encounters-list"></div>
                </section>
                <section id="orders-section" class="tab-content" aria-labelledby="orders-title">
                    <h2 id="orders-title">Orders</h2>
                    <div id="service-request-list"></div>
                </section>
            </div>
        </div>
    </main>

    <!-- Scripts in dependency order -->
    <script src="js/config.js"></script>
    <script src="js/smart-callback.js"></script>
    <script src="js/ui-controller.js"></script>
</body>
</html>
