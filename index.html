<div class="window-box"><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMART on FHIR Appointments Dashboard</title>
    <!-- External CSS link added here -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="window-box">
  <!-- Dynamic status and tracking container -->
  <div id="status" class="loading">Initializing launch handshake...</div>

  <!-- Updated with clean classes instead of inline styles -->
  <div id="demographics-view" style="display: none;">
  <header>  
        <h3>Patient Dashboard</h3>
        <div class="demographics-banner">
            <div class="data-item"><strong>patient name:</strong> <span id="pt-name"></span></div>
            <div class="data-item"><strong>birth date:</strong> <span id="pt-dob"></span></div>
            <div class="data-item"><strong>gender:</strong> <span id="pt-gender"></span></div>
        </div>
        <nav class="dashboard-nav">
            <button class="nav-btn" onclick="switchTab(event, 'home-section')">Home</button>
            <button class="nav-btn active" onclick="switchTab(event, 'appointments-section')">Appointments</button>
            <button class="nav-btn" onclick="switchTab(event, 'encounters-section')">Encounters</button>
        </nav>
 </header>

<!-- Wrappers for your sections -->
<div class="dashboard-content">

    <!-- Home Section (Visible by default) -->
    <section id="home-section" class="tab-content active">
        <h4>Appointments:</h4>
        <div id="appointments-list"></div>
    </section>
    
    <!-- Appointments Section (Hidden by default) -->
    <section id="appointments-section" class="tab-content active">
        <h4>Appointments:</h4>
        <div id="appointments-list"></div>
    </section>

    <!-- Encounters Section (Hidden by default) -->
    <section id="encounters-section" class="tab-content">
        <h4>Encounters:</h4>
        <div id="encounters-list"></div>
    </section>

</div>

    <!-- Scripts organized strictly by execution layer dependencies -->
    <script src="js/config.js"></script>
    <script src="js/smart-callback.js"></script>
    <script src="js/ui-controller.js"></script>  
</body>
</html>
