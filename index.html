    <h4>Scheduled Patient Appointments:</h4>
    <div id="appointments-list"></div>

    <!-- Dedicated container for medical encounters -->
    <h4>Recent Medical Encounters:</h4>
    <div id="encounters-list"></div>
    
  </div>
</div>

    <script src="js/config.js"></script>
